<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Thiết kế hóa đơn thanh toán</title>
    <link rel="stylesheet" href="../css/style4.css">
</head>
<body>
    
        <h2>Hóa đơn thanh toán </h2> <br>
         <table>
                <tr>
                    <th>STT</th> <th>Tên sản phẩm</th> <th>Số lượng</th> <th>Đơn giá </th> <th>Thành tiền</th>
                </tr>
                        <tr>
                             <td>1</td> <td>A</td> <td class =" sl">3</td> <td class="dgia">1000</td> <td class="tt">?</td>
                        </tr>
                        <tr>
                             <td>2</td> <td>B</td> <td class ="sl">4</td> <td class="dgia">2000</td> <td class="tt">?</td>
                        </tr>
                        <tr>
                            <td>3</td> <td>C</td> <td class="sl">5 </td> <td class="dgia">4000</td> <td class="tt">?</td>
                        </tr>
                        <tr>
                             <td>4</td> <td>D</td> <td class="sl">2 </td> <td class="dgia">5000</td> <td class="tt">?</td>
                        </tr>

                         <tr>
                            <td colspan="3"> Tổng thanh toán </td>
                            <td colspan="2 " id ="tong"></td>
                         </tr>
         </table>

<script>
    const dongia =document.getElementsByClassName("dgia");
    const soLuong = document.getElementsByClassName("sl");
    const thanhtien = document.getElementsByClassName("tt");
    let tong = 0;
    for(let i=0; i< dongia.length; i++)
    {
        thanhtien[i].innerHTML = parseInt(dongia[i].innerHTML* parseInt(soLuong[i].innerHTML));
        tong += parseInt(thanhtien[i].innerHTML);
        
    }
    document.getElementById("tong").innerHTML = tong;
</script>


</body>
</html>
